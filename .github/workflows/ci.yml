name: CI Check

permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Auction-Project/package-lock.json

      - run: npm ci
        working-directory: Auction-Project

      - run: npm run lint
        working-directory: Auction-Project

      - run: npm run build
        working-directory: Auction-Project